name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy --all-targets --message-format=short

      - name: Clippy (common P2 features)
        run: cargo clippy --all-targets --features "incremental,rename,thumbnails,watermark" --message-format=short

      - name: Clippy (server feature)
        run: cargo clippy --all-targets --features server --message-format=short

      # 逐步收敛告警后再升级为 -D warnings；当前先保证 lint 任务可运行。
      - name: Clippy deny new panics in core paths
        run: >
          cargo clippy --all-targets
          --features "incremental,rename,thumbnails,watermark"
          -- -W clippy::unwrap_used -W clippy::expect_used
        continue-on-error: true

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

      - name: Build with common features
        run: cargo build --features "incremental,rename,thumbnails,watermark"

      - name: Test with common features
        run: cargo test --features "incremental,rename,thumbnails,watermark"

      - name: Build server feature
        run: cargo build --features server --bins

      - name: Test server feature
        run: cargo test --features server

  build-gui:
    name: gui-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: gui

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config

      - name: Build GUI features
        run: cargo build --features gui --bins

      - name: Test GUI features
        run: cargo test --features gui
