services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: imgforge
      POSTGRES_USER: imgforge
      POSTGRES_PASSWORD: imgforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: imgforge
      MINIO_ROOT_PASSWORD: imgforge-secret
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 imgforge imgforge-secret; do sleep 2; done;
      mc mb --ignore-existing local/imgforge;
      "

  imgforge-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      - postgres
      - redis
      - minio
      - minio-init
    environment:
      IMGFORGE_SERVER_BIND: 0.0.0.0:8787
      IMGFORGE_PUBLIC_BASE: http://127.0.0.1:8787
      IMGFORGE_SERVER_TOKEN: change-me
      IMGFORGE_DEFAULT_WORKSPACE: default
      IMGFORGE_RATE_LIMIT_PER_MINUTE: 120
      IMGFORGE_DATABASE_URL: postgres://imgforge:imgforge@postgres:5432/imgforge
      IMGFORGE_REDIS_URL: redis://redis:6379
      IMGFORGE_S3_ENDPOINT: http://minio:9000
      IMGFORGE_S3_REGION: us-east-1
      IMGFORGE_S3_BUCKET: imgforge
      IMGFORGE_S3_ACCESS_KEY: imgforge
      IMGFORGE_S3_SECRET_KEY: imgforge-secret
      IMGFORGE_S3_PATH_STYLE: "true"
      IMGFORGE_INLINE_WORKER: "true"
    ports:
      - "8787:8787"
    volumes:
      - server-data:/var/lib/imgforge/server

volumes:
  postgres-data:
  redis-data:
  minio-data:
  server-data:
